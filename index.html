<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        form {
            width: 100%;
            max-width: 350px;
        }

        fieldset {
            border: none;
            padding: 30px;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        legend {
            width: 100%;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        fieldset {
            position: relative;
        }

        legend {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 5px 15px;
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        p {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            fieldset {
                padding: 20px;
            }

            legend {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <form action="">
        <fieldset>
            <legend>Login Form</legend>
            <p>
                <label for="username">Username</label>
                <br>
                <input type="text" name="" id="username" required placeholder="Enter Your Name">
            </p>

            <p>
                <label for="Password">Password</label>
                <br>
                <input type="password" name="" id="Password" required placeholder="Enter Your Password">
            </p>
            <p>
                <input type="submit" value="Login">
            </p>
        </fieldset>
    </form>

</body>

</html>
